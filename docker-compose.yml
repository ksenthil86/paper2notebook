services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
