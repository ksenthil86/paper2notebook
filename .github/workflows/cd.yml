name: CD — Build, Push, Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build + push ECR + deploy ECS
    runs-on: ubuntu-latest
    needs: []  # runs after push; add needs: [ci-backend, ci-frontend, ci-security] once those jobs are in the same workflow or via workflow_run

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          IMAGE="${REGISTRY}/paper2notebook-backend"
          docker build -f Dockerfile.backend -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE="${REGISTRY}/paper2notebook-frontend"
          docker build -f Dockerfile.frontend -t "${IMAGE}:latest" -t "${IMAGE}:${{ github.sha }}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Deploy to ECS (rolling update)
        run: |
          aws ecs update-service \
            --cluster paper2notebook \
            --service paper2notebook-backend \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Write deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend image**: \`paper2notebook-backend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend image**: \`paper2notebook-frontend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS service**: rolling update triggered" >> $GITHUB_STEP_SUMMARY
