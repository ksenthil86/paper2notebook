name: Backend CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest + bandit + pip-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest bandit pip-audit

      - name: Run tests
        run: pytest tests/unit/ tests/integration/ -q

      - name: Run bandit
        run: bandit -r backend/ -q

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt
